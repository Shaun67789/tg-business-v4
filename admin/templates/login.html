<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — TG Business Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body class="login-body">
  <div class="login-bg">
    <div class="login-blob login-blob-1"></div>
    <div class="login-blob login-blob-2"></div>
    <div class="login-blob login-blob-3"></div>
  </div>
  <div class="login-container">
    <div class="login-card glass-card">
      <div class="login-logo">
        <span class="login-logo-icon">⚡</span>
        <h1 class="login-title">TG Business</h1>
        <p class="login-subtitle">Admin Control Panel</p>
      </div>
      {% if error %}
      <div class="alert alert-error">
        <span>⚠️</span> {{ error }}
      </div>
      {% endif %}
      <form method="post" action="/admin/login" class="login-form">
        <div class="form-group">
          <label class="form-label">Username</label>
          <input type="text" name="username" class="form-input" placeholder="Enter username" required autocomplete="username"/>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-input" placeholder="Enter password" required autocomplete="current-password"/>
        </div>
        <button type="submit" class="btn btn-primary btn-full">
          <span>🔐</span> Sign In
        </button>
      </form>
    </div>
  </div>
</body>
</html>
